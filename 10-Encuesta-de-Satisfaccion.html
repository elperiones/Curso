<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Encuesta</title>
</head>
<body>
    <form>
        <p>¿Te gusta la programación?</p>
        <input type="radio" name="gusta"> Sí
        <input type="radio" name="gusta"> No

        <p>Lenguaje favorito:</p>
        <select name="lenguaje">
            <option>Python</option>
            <option>HTML</option>
            <option>SQL</option>
        </select>

        <p>Temas de interés:</p>
        <input type="checkbox" name="tema" > Desarrollo Web
        <input type="checkbox" name="tema" > Ciencia de Datos

        <br><br>
        <button type="submit">Enviar</button>
    </form>
</html>
