<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Simple de Horarios</title>
</head>
<body>
    <table>
        <tr>
            <th>Día</th>
            <th>Hora</th>
            <th>Actividad</th>
        </tr>
        <tr>
            <td>Lunes</td>
            <td>9:00 - 10:00</td>
            <td>Matemáticas</td>
        </tr>
        <tr>
            <td>Martes</td>
            <td>10:00 - 11:00</td>
            <td>Historia</td>
        </tr>
        <tr>
            <td>Miércoles</td>
            <td>11:00 - 12:00</td>
            <td>Ciencias</td>
        </tr>   
    </table>
</body>
</html>
